services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vb-tata-capital-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://api-v2.admin-wwai.com}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
